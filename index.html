<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Weight Calculator</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 10px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    label {
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-bottom: 8px;
    }

    .row input {
      margin: 0;
    }

    .weight {
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8f5e9;
      border-radius: 8px;
    }

    button {
      padding: 12px;
      margin-top: 8px;
      width: 100%;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .total {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Weight Calculator</h2>

  <label>Width (mm)</label>
  <input type="number" id="width">

  <label>Thickness (mm)</label>
  <input type="number" id="thickness">

  <div id="inputs"></div>

  <button onclick="addRow()">+ Add Row</button>
  <button onclick="calculate()">Calculate</button>

  <div class="total" id="result">Total: 0 kg</div>
</div>

<script>
  const constant = 2.27;

  function addRow() {
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <input type="number" placeholder="Length (inch)">
      <input type="number" placeholder="Qty">
      <div class="weight">0 kg</div>
    `;
    document.getElementById('inputs').appendChild(div);
  }

  function calculate() {
    const width = parseFloat(document.getElementById('width').value);
    const thickness = parseFloat(document.getElementById('thickness').value);

    let total = 0;

    const rows = document.querySelectorAll('#inputs .row');

    rows.forEach(row => {
      const length = parseFloat(row.children[0].value);
      const qty = parseFloat(row.children[1].value);
      const weightBox = row.children[2];

      if (!isNaN(length) && !isNaN(qty) && !isNaN(width) && !isNaN(thickness)) {
        let lengthInFeet = length / 12;
        let weight = (width * thickness * lengthInFeet * constant * qty) / 1000;
        total += weight;
        weightBox.innerText = weight.toFixed(2) + " kg";
      } else {
        weightBox.innerText = "0 kg";
      }
    });

    document.getElementById('result').innerText = "Total: " + total.toFixed(2) + " kg";
  }

  // default rows
  for (let i = 0; i < 5; i++) addRow();
</script>

</body>
</html>
